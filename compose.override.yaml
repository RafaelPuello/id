name: identification-service

services:
  id-backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8001:8001"
    labels:
      - "traefik.http.routers.id-backend.rule=Host(`10.0.0.218`) && (PathPrefix(`/api`) || PathPrefix(`/accounts`) || PathPrefix(`/_allauth`))"
      - "traefik.http.routers.id-backend.entrypoints=web"
      - "traefik.http.routers.id-backend.tls=false"
    env_file:
      - ./backend/.env.dev
    environment:
      - JWT_PRIVATE_KEY_PATH=/home/web/code/config/keys/jwt_private_key.pem
      - JWT_PUBLIC_KEY_PATH=/home/web/code/config/keys/jwt_public_key.pem
    volumes:
      - ./backend:/home/web/code

  id-frontend:
    build:
      context: ../
      dockerfile: id/frontend/Dockerfile
      target: dev
    ports:
      - "5173:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.id-frontend.rule=Host(`10.0.0.218`) && PathPrefix(`/id`)"
      - "traefik.http.routers.id-frontend.entrypoints=web"
      - "traefik.http.routers.id-frontend.tls=false"
      - "traefik.http.routers.id-frontend.priority=10"
      - "traefik.http.routers.id-frontend.middlewares=id-slash-redirect"
      - "traefik.http.services.id-frontend.loadbalancer.server.port=5173"
      # Redirect /id (no trailing slash) → /id/
      - "traefik.http.middlewares.id-slash-redirect.redirectregex.regex=^(https?://[^/]+)/id$$"
      - "traefik.http.middlewares.id-slash-redirect.redirectregex.replacement=$${1}/id/"
      - "traefik.http.middlewares.id-slash-redirect.redirectregex.permanent=true"
    env_file:
      - ./frontend/.env
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ../shared/styles:/app/src/styles:ro